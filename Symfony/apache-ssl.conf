<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/public_html

    SSLEngine on
    SSLCertificateFile /var/www/var/certs/cert.crt
    SSLCertificateKeyFile /var/www/var/certs/cert.key

    <Directory /var/www/public_html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>